<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Biblioteca BL</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0e0c14;
    --surface: #16131f;
    --card: #1d1929;
    --card2: #211c30;
    --border: #2e2840;
    --accent: #c084fc;
    --accent2: #e879f9;
    --text: #e8e0f0;
    --muted: #7c6f94;
    --leido: #34d399;
    --leyendo: #60a5fa;
    --porLeer: #f472b6;
    --pausado: #fbbf24;
    --dropped: #f87171;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* HEADER */
  .header {
    padding: 32px 20px 20px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #1a0a2e 0%, var(--bg) 100%);
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(192,132,252,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    position: relative;
  }
  .header p {
    color: var(--muted);
    font-size: 12px;
    margin-top: 4px;
    font-style: italic;
    position: relative;
  }

  /* STATS */
  .stats {
    display: flex;
    gap: 8px;
    padding: 16px 16px 0;
    justify-content: center;
    flex-wrap: wrap;
  }
  .stat-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 11px;
    font-size: 12px;
    color: var(--muted);
  }
  .stat-chip .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .stat-chip strong { color: var(--text); }

  /* CONTROLES */
  .controls {
    padding: 14px 16px 0;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-wrap {
    flex: 1;
    min-width: 160px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px 8px 30px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    font-family: 'Inter', sans-serif;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap svg {
    position: absolute;
    left: 9px; top: 50%;
    transform: translateY(-50%);
    width: 13px; height: 13px;
    color: var(--muted);
    pointer-events: none;
  }
  .view-toggle {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .view-toggle button {
    background: none;
    border: none;
    color: var(--muted);
    padding: 8px 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    font-size: 13px;
  }
  .view-toggle button.active {
    background: rgba(192,132,252,0.15);
    color: var(--accent);
  }

  .filter-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    padding: 12px 16px 0;
  }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 11px;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn.active, .filter-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .filter-btn.active { background: rgba(192,132,252,0.1); }

  /* TIPO TABS */
  .tipo-tabs {
    display: flex;
    gap: 0;
    margin: 14px 16px 0;
    border-bottom: 1px solid var(--border);
  }
  .tipo-btn {
    flex: 1;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 9px 4px;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
    text-align: center;
  }
  .tipo-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .sort-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px 0;
    font-size: 11px;
    color: var(--muted);
  }
  .sort-row select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 4px 6px;
    font-size: 11px;
    font-family: 'Inter', sans-serif;
  }

  .backup-row {
    display: flex;
    gap: 8px;
    padding: 10px 16px 0;
  }
  .backup-btn {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 8px;
    color: var(--muted);
    font-size: 11px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }
  .backup-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* LISTA - list view */
  .list {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    transition: border-color 0.15s;
    cursor: pointer;
    display: flex;
    gap: 10px;
  }
  .card:hover { border-color: var(--accent); }
  .card.expanded { border-color: rgba(192,132,252,0.45); }

  .cover {
    width: 52px;
    height: 72px;
    border-radius: 6px;
    background: var(--surface);
    object-fit: cover;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }
  .cover-placeholder {
    width: 52px;
    height: 72px;
    border-radius: 6px;
    background: linear-gradient(135deg, var(--card2), var(--surface));
    border: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--muted);
    font-size: 18px;
  }

  .card-main { flex: 1; min-width: 0; }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }

  .card-title {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
    line-height: 1.3;
    color: var(--text);
  }

  .card-status-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  .card-status-label {
    font-size: 11px;
    color: var(--muted);
  }
  .card-tipo-badge {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
    background: var(--surface);
    border-radius: 4px;
    padding: 1px 5px;
  }
  .card-chapters {
    font-size: 10px;
    color: var(--muted);
    background: var(--surface);
    border-radius: 4px;
    padding: 1px 5px;
  }
  .card-stars-preview {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  /* EXPANDED */
  .card-body {
    display: none;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .card.expanded .card-body { display: block; }

  .card-note {
    background: var(--surface);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 10px;
    font-style: italic;
    min-height: 30px;
    white-space: pre-wrap;
  }

  .card-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }

  .status-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 8px;
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    flex: 1;
    min-width: 110px;
  }
  .status-select:focus { outline: none; border-color: var(--accent); }

  .stars {
    display: flex;
    gap: 2px;
    align-items: center;
  }
  .star {
    font-size: 17px;
    cursor: pointer;
    opacity: 0.3;
    transition: opacity 0.1s, transform 0.1s;
    line-height: 1;
    color: var(--accent2);
  }
  .star.lit { opacity: 1; }
  .star:active { transform: scale(1.2); }

  .edit-note-btn, .save-note-btn, .delete-btn {
    background: rgba(192,132,252,0.15);
    border: 1px solid rgba(192,132,252,0.3);
    border-radius: 6px;
    padding: 5px 10px;
    color: var(--accent);
    font-size: 12px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    white-space: nowrap;
  }
  .delete-btn {
    background: rgba(248,113,113,0.1);
    border-color: rgba(248,113,113,0.3);
    color: var(--dropped);
  }

  .note-editor {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 8px 10px;
    color: var(--text);
    font-size: 13px;
    line-height: 1.5;
    font-family: 'Inter', sans-serif;
    resize: vertical;
    min-height: 70px;
    margin-bottom: 8px;
    display: none;
  }

  .cover-editor {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 8px 10px;
    color: var(--text);
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    margin-bottom: 8px;
    display: none;
    outline: none;
  }

  .card-link {
    font-size: 11px;
    color: var(--accent);
    text-decoration: none;
    display: inline-block;
    margin-top: 8px;
  }

  /* GRID VIEW */
  .grid {
    display: none;
    padding: 12px 16px;
    grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
    gap: 12px;
  }
  .grid.active { display: grid; }
  .list.hidden { display: none; }

  .gcard {
    cursor: pointer;
    position: relative;
  }
  .gcard .cover, .gcard .cover-placeholder {
    width: 100%;
    height: 132px;
  }
  .gcard .status-dot {
    position: absolute;
    top: 6px; right: 6px;
    margin: 0;
    width: 9px; height: 9px;
    box-shadow: 0 0 0 2px rgba(14,12,20,0.8);
  }
  .gcard .gtitle {
    font-size: 11px;
    margin-top: 5px;
    line-height: 1.3;
    color: var(--text);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .gcard .gstars {
    font-size: 9px;
    color: var(--accent);
    margin-top: 2px;
    letter-spacing: 0.5px;
  }

  /* ADD BUTTON */
  .add-btn {
    position: fixed;
    bottom: 24px; right: 20px;
    width: 50px; height: 50px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: white;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(192,132,252,0.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }

  /* MODAL */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 16px 16px 0 0;
    border: 1px solid var(--border);
    padding: 20px 16px 32px;
    width: 100%;
    max-width: 500px;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal h3 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    margin-bottom: 14px;
    color: var(--accent);
  }
  .modal input, .modal select, .modal textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    margin-bottom: 10px;
    outline: none;
  }
  .modal input:focus, .modal select:focus, .modal textarea:focus {
    border-color: var(--accent);
  }
  .modal label {
    font-size: 11px;
    color: var(--muted);
    display: block;
    margin: -4px 0 6px;
  }
  .modal-btns {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }
  .btn-cancel {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    cursor: pointer;
  }
  .btn-add {
    flex: 2;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 8px;
    padding: 10px;
    color: white;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    cursor: pointer;
  }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-style: italic;
  }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .lock-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    padding: 32px;
  }
  .lock-screen h2 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    text-align: center;
  }
  .lock-screen p {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 24px;
    text-align: center;
  }
  .lock-screen input {
    width: 100%;
    max-width: 280px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 16px;
    font-family: 'Inter', sans-serif;
    text-align: center;
    outline: none;
    margin-bottom: 12px;
  }
  .lock-screen input:focus { border-color: var(--accent); }
  .lock-screen button {
    width: 100%;
    max-width: 280px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    padding: 12px;
    color: white;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    cursor: pointer;
  }
  .lock-screen .lock-error {
    color: var(--dropped);
    font-size: 12px;
    margin-top: 10px;
    display: none;
  }
</style>
</head>
<body>

<div class="lock-screen" id="lockScreen">
  <h2>✦ Mi Biblioteca BL ✦</h2>
  <p>Ingresá la contraseña para continuar</p>
  <input type="password" id="lockInput" placeholder="••••••••" maxlength="40">
  <button id="lockBtn">Entrar</button>
  <div class="lock-error" id="lockError">Contraseña incorrecta ✗</div>
</div>

<div id="appContent" style="display:none">

<div class="header">
  <h1>✦ Mi Biblioteca BL ✦</h1>
  <p id="subtitle">cargando...</p>
</div>

<div class="stats" id="stats"></div>

<div class="controls">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="text" id="search" placeholder="Buscar título...">
  </div>
  <div class="view-toggle">
    <button id="viewListBtn" class="active" title="Vista lista">☰</button>
    <button id="viewGridBtn" title="Vista portadas">▦</button>
  </div>
</div>

<div class="tipo-tabs">
  <button class="tipo-btn active" data-tipo="all">Todos</button>
  <button class="tipo-btn" data-tipo="novela">Novelas</button>
  <button class="tipo-btn" data-tipo="comic">Manga / Manhwa</button>
</div>

<div class="filter-tabs" id="filterTabs">
  <button class="filter-btn active" data-filter="all">Todos</button>
  <button class="filter-btn" data-filter="leido">Leídos</button>
  <button class="filter-btn" data-filter="leyendo">Leyendo</button>
  <button class="filter-btn" data-filter="porLeer">Por leer</button>
  <button class="filter-btn" data-filter="pausado">Pausado</button>
  <button class="filter-btn" data-filter="dropped">Dropped</button>
</div>

<div class="sort-row">
  <span id="countLabel"></span>
  <select id="sortSelect">
    <option value="title">A–Z</option>
    <option value="status">Por estado</option>
    <option value="rating">Por calificación</option>
  </select>
</div>

<div class="backup-row">
  <button class="backup-btn" id="exportBtn">⬇️ Exportar respaldo</button>
  <button class="backup-btn" id="importBtn">⬆️ Importar respaldo</button>
  <input type="file" id="importFile" accept="application/json" style="display:none">
</div>

<div class="list" id="list"><div class="loading">cargando tu biblioteca...</div></div>
<div class="grid" id="grid"></div>

</div><!-- /appContent -->

<button class="add-btn" id="addBtn">＋</button>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>Agregar título</h3>
    <input type="text" id="newTitle" placeholder="Título">
    <label>Tipo</label>
    <select id="newTipo">
      <option value="novela">Novela</option>
      <option value="comic">Manga / Manhwa</option>
    </select>
    <label>Estado</label>
    <select id="newStatus">
      <option value="porLeer">Por leer</option>
      <option value="leyendo">Leyendo</option>
      <option value="leido">Leído</option>
      <option value="pausado">Pausado</option>
      <option value="dropped">Dropped</option>
    </select>
    <label>Portada (URL, opcional)</label>
    <input type="text" id="newCover" placeholder="https://...">
    <label>Notas</label>
    <textarea id="newNote" placeholder="Escribí tus notas... (opcional)" rows="3"></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" id="cancelBtn">Cancelar</button>
      <button class="btn-add" id="confirmAdd">Agregar</button>
    </div>

<script>
const PASS_KEY = 'bl_auth_v1';
const CORRECT = 'nubesbondadosas';

function checkAuth() {
  try { return sessionStorage.getItem(PASS_KEY) === '1'; } catch(e) { return false; }
}
function unlock() {
  try { sessionStorage.setItem(PASS_KEY, '1'); } catch(e) {}
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('appContent').style.display = 'block';
}

document.getElementById('lockBtn').addEventListener('click', () => {
  const val = document.getElementById('lockInput').value;
  if (val === CORRECT) {
    unlock();
  } else {
    const err = document.getElementById('lockError');
    err.style.display = 'block';
    document.getElementById('lockInput').value = '';
    document.getElementById('lockInput').focus();
    setTimeout(() => { err.style.display = 'none'; }, 2500);
  }
});
document.getElementById('lockInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('lockBtn').click();
});

if (checkAuth()) { unlock(); }

const STATUS = {
  leido:   { label: 'Leído',    color: '#34d399' },
  leyendo: { label: 'Leyendo',  color: '#60a5fa' },
  porLeer: { label: 'Por leer', color: '#f472b6' },
  pausado: { label: 'Pausado',  color: '#fbbf24' },
  dropped: { label: 'Dropped',  color: '#f87171' },
};

const TIPO_LABEL = { novela: 'Novela', comic: 'Manga/Manhwa' };

const SEED = JSON.parse(document.getElementById('seed-data').textContent);

// ---- STATE ----
let data = [];
let nextId = 10000;
let activeFilter = 'all';
let activeTipo = 'all';
let searchQ = '';
let expandedId = null;
let viewMode = 'list';
let sortBy = 'title';
let storageReady = false;

const STORAGE_KEY = 'bl_tracker_data_v1';

async function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      data = parsed.data || SEED;
      nextId = parsed.nextId || 10000;
    } else {
      data = JSON.parse(JSON.stringify(SEED));
    }
  } catch (e) {
    data = JSON.parse(JSON.stringify(SEED));
  }
  storageReady = true;
}

let saveTimeout = null;
function save() {
  if (saveTimeout) clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ data, nextId }));
    } catch (e) {
      console.error('Error guardando', e);
      alert('No se pudo guardar. Es posible que el navegador esté bloqueando el almacenamiento local (modo privado/incógnito) o que se haya quedado sin espacio.');
    }
  }, 250);
}

function getFiltered() {
  let items = data.filter(item => {
    if (activeFilter !== 'all' && item.status !== activeFilter) return false;
    if (activeTipo !== 'all' && item.tipo !== activeTipo) return false;
    if (searchQ && !item.title.toLowerCase().includes(searchQ.toLowerCase())) return false;
    return true;
  });
  const statusOrder = { leyendo: 0, porLeer: 1, pausado: 2, leido: 3, dropped: 4 };
  if (sortBy === 'title') {
    items.sort((a,b) => a.title.localeCompare(b.title, 'es'));
  } else if (sortBy === 'status') {
    items.sort((a,b) => (statusOrder[a.status]??9) - (statusOrder[b.status]??9) || a.title.localeCompare(b.title,'es'));
  } else if (sortBy === 'rating') {
    items.sort((a,b) => (b.rating||0) - (a.rating||0) || a.title.localeCompare(b.title,'es'));
  }
  return items;
}

function renderStats() {
  const counts = { leido: 0, leyendo: 0, porLeer: 0, pausado: 0, dropped: 0 };
  data.forEach(d => { if (counts[d.status] !== undefined) counts[d.status]++; });
  const total = data.length;
  document.getElementById('subtitle').textContent = `${total} títulos en la biblioteca`;
  document.getElementById('stats').innerHTML = Object.entries(counts).map(([k,v]) =>
    `<div class="stat-chip"><div class="dot" style="background:${STATUS[k].color}"></div><strong>${v}</strong> ${STATUS[k].label}</div>`
  ).join('');
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function coverHtml(item, cls) {
  if (item.cover) {
    return `<img class="${cls}" src="${escapeHtml(item.cover)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=&quot;cover-placeholder${cls==='cover'?'':' '+cls}&quot;>✦</div>'">`;
  }
  return `<div class="cover-placeholder">✦</div>`;
}

function renderList() {
  const items = getFiltered();
  document.getElementById('countLabel').textContent = `${items.length} resultado${items.length===1?'':'s'}`;
  const list = document.getElementById('list');
  if (items.length === 0) {
    list.innerHTML = '<div class="empty">No hay títulos que coincidan ✨</div>';
    return;
  }
  list.innerHTML = items.map(item => {
    const s = STATUS[item.status] || STATUS.porLeer;
    const stars = [1,2,3,4,5].map(i =>
      `<span class="star ${item.rating >= i ? 'lit' : ''}" data-id="${item.id}" data-star="${i}">★</span>`
    ).join('');
    const isExp = expandedId === item.id;
    const starsPreview = item.rating > 0 ? `<span class="card-stars-preview">${'★'.repeat(item.rating)}${'☆'.repeat(5-item.rating)}</span>` : '';
    return `
    <div class="card ${isExp ? 'expanded' : ''}" data-id="${item.id}">
      ${coverHtml(item, 'cover')}
      <div class="card-main">
        <div class="card-header">
          <div class="status-dot" style="background:${s.color}"></div>
          <div style="flex:1; min-width:0">
            <div class="card-title">${escapeHtml(item.title)}</div>
            <div class="card-status-row">
              <span class="card-status-label">${s.label}</span>
              <span class="card-tipo-badge">${TIPO_LABEL[item.tipo] || item.tipo}</span>
              ${item.chapters ? `<span class="card-chapters">${item.chapters}</span>` : ''}
              ${starsPreview}
            </div>
          </div>
        </div>
        <div class="card-body">
          ${item.note ? `<div class="card-note">${escapeHtml(item.note)}</div>` : '<div class="card-note" style="color:var(--muted);font-style:italic">Sin notas aún...</div>'}
          <textarea class="note-editor" id="editor-${item.id}" placeholder="Escribí tus notas...">${escapeHtml(item.note||'')}</textarea>
          <input type="text" class="cover-editor" id="cover-editor-${item.id}" placeholder="URL de la portada (https://...)" value="${escapeHtml(item.cover||'')}">
          <div class="card-actions">
            <select class="status-select" data-id="${item.id}">
              ${Object.entries(STATUS).map(([k,v]) =>
                `<option value="${k}" ${item.status===k?'selected':''}>${v.label}</option>`
              ).join('')}
            </select>
            <div class="stars">${stars}</div>
          </div>
          <div class="card-actions" style="margin-top:6px">
            <button class="edit-note-btn" data-id="${item.id}">✏️ Nota</button>
            <button class="save-note-btn" data-id="${item.id}" style="display:none">💾 Guardar nota</button>
            <button class="edit-cover-btn" data-id="${item.id}">${item.cover ? '🖼️ Cambiar portada' : '🖼️ Agregar portada'}</button>
            <button class="save-cover-btn" data-id="${item.id}" style="display:none">💾 Guardar portada</button>
            <button class="delete-btn" data-id="${item.id}">🗑️ Eliminar</button>
          </div>
          ${item.url ? `<a class="card-link" href="${escapeHtml(item.url)}" target="_blank" rel="noopener">Ver fuente original ↗</a>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderGrid() {
  const items = getFiltered();
  const grid = document.getElementById('grid');
  if (items.length === 0) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1">No hay títulos que coincidan ✨</div>';
    return;
  }
  grid.innerHTML = items.map(item => {
    const s = STATUS[item.status] || STATUS.porLeer;
    const starsPreview = item.rating > 0 ? `<div class="gstars">${'★'.repeat(item.rating)}</div>` : '';
    return `
    <div class="gcard" data-id="${item.id}">
      <div style="position:relative">
        ${coverHtml(item, 'cover')}
        <div class="status-dot" style="background:${s.color}"></div>
      </div>
      <div class="gtitle">${escapeHtml(item.title)}</div>
      ${starsPreview}
    </div>`;
  }).join('');
}

function render() {
  renderStats();
  if (viewMode === 'list') {
    renderList();
  } else {
    renderGrid();
  }
}

function switchToListAndExpand(id) {
  viewMode = 'list';
  document.getElementById('viewListBtn').classList.add('active');
  document.getElementById('viewGridBtn').classList.remove('active');
  document.getElementById('list').classList.remove('hidden');
  document.getElementById('grid').classList.remove('active');
  expandedId = id;
  render();
}

// ---- EVENTS ----
document.getElementById('list').addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card) return;
  const id = +card.dataset.id;

  if (e.target.matches('.status-select')) {
    const item = data.find(d => d.id === id);
    if (item) { item.status = e.target.value; save(); expandedId = id; render(); }
    return;
  }

  if (e.target.matches('.star')) {
    const item = data.find(d => d.id === +e.target.dataset.id);
    if (item) {
      const val = +e.target.dataset.star;
      item.rating = (item.rating === val) ? 0 : val;
      save(); expandedId = id; render();
    }
    return;
  }

  if (e.target.matches('.edit-note-btn')) {
    const editor = document.getElementById(`editor-${id}`);
    const saveBtn = card.querySelector('.save-note-btn');
    const noteDisplay = card.querySelector('.card-note');
    if (editor) {
      const show = editor.style.display !== 'block';
      editor.style.display = show ? 'block' : 'none';
      if (saveBtn) saveBtn.style.display = show ? 'inline-block' : 'none';
      if (noteDisplay) noteDisplay.style.display = show ? 'none' : 'block';
    }
    return;
  }

  if (e.target.matches('.save-note-btn')) {
    const editor = document.getElementById(`editor-${id}`);
    const item = data.find(d => d.id === id);
    if (item && editor) { item.note = editor.value; save(); expandedId = id; render(); }
    return;
  }

  if (e.target.matches('.edit-cover-btn')) {
    const editor = document.getElementById(`cover-editor-${id}`);
    const saveBtn = card.querySelector('.save-cover-btn');
    if (editor) {
      const show = editor.style.display !== 'block';
      editor.style.display = show ? 'block' : 'none';
      if (saveBtn) saveBtn.style.display = show ? 'inline-block' : 'none';
      if (show) { editor.focus(); editor.select(); }
    }
    return;
  }

  if (e.target.matches('.save-cover-btn')) {
    const editor = document.getElementById(`cover-editor-${id}`);
    const item = data.find(d => d.id === id);
    if (item && editor) {
      item.cover = editor.value.trim() || null;
      save(); expandedId = id; render();
    }
    return;
  }

  if (e.target.matches('.delete-btn')) {
    if (confirm('¿Eliminar este título de la biblioteca?')) {
      data = data.filter(d => d.id !== id);
      save();
      expandedId = null;
      render();
    }
    return;
  }

  if (e.target.closest('.card-link')) return;

  expandedId = (expandedId === id) ? null : id;
  render();
});

document.getElementById('grid').addEventListener('click', e => {
  const gcard = e.target.closest('.gcard');
  if (!gcard) return;
  switchToListAndExpand(+gcard.dataset.id);
});

document.getElementById('list').addEventListener('keydown', e => {
  if (e.target.matches('.cover-editor') && e.key === 'Enter') {
    e.preventDefault();
    const card = e.target.closest('.card');
    const saveBtn = card.querySelector('.save-cover-btn');
    if (saveBtn) saveBtn.click();
  }
});

document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value;
  render();
});

document.getElementById('sortSelect').addEventListener('change', e => {
  sortBy = e.target.value;
  render();
});

document.getElementById('viewListBtn').addEventListener('click', () => {
  viewMode = 'list';
  document.getElementById('viewListBtn').classList.add('active');
  document.getElementById('viewGridBtn').classList.remove('active');
  document.getElementById('list').classList.remove('hidden');
  document.getElementById('grid').classList.remove('active');
  render();
});
document.getElementById('viewGridBtn').addEventListener('click', () => {
  viewMode = 'grid';
  document.getElementById('viewGridBtn').classList.add('active');
  document.getElementById('viewListBtn').classList.remove('active');
  document.getElementById('list').classList.add('hidden');
  document.getElementById('grid').classList.add('active');
  render();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});

document.querySelectorAll('.tipo-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tipo-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTipo = btn.dataset.tipo;
    render();
  });
});

// ADD MODAL
document.getElementById('addBtn').addEventListener('click', () => {
  document.getElementById('modalBg').classList.add('open');
});
document.getElementById('cancelBtn').addEventListener('click', () => {
  document.getElementById('modalBg').classList.remove('open');
});
document.getElementById('modalBg').addEventListener('click', e => {
  if (e.target === document.getElementById('modalBg'))
    document.getElementById('modalBg').classList.remove('open');
});
document.getElementById('confirmAdd').addEventListener('click', () => {
  const title = document.getElementById('newTitle').value.trim();
  if (!title) return;
  const cover = document.getElementById('newCover').value.trim();
  data.push({
    id: nextId++,
    title,
    tipo: document.getElementById('newTipo').value,
    status: document.getElementById('newStatus').value,
    rating: 0,
    note: document.getElementById('newNote').value.trim(),
    cover: cover || null,
    chapters: null,
  });
  save();
  document.getElementById('modalBg').classList.remove('open');
  document.getElementById('newTitle').value = '';
  document.getElementById('newCover').value = '';
  document.getElementById('newNote').value = '';
  render();
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const payload = JSON.stringify({ data, nextId }, null, 2);
  const blob = new Blob([payload], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const fecha = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `biblioteca-bl-respaldo-${fecha}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

document.getElementById('importBtn').addEventListener('click', () => {
  document.getElementById('importFile').click();
});

document.getElementById('importFile').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      if (!parsed.data || !Array.isArray(parsed.data)) {
        alert('Este archivo no tiene el formato esperado de respaldo.');
        return;
      }
      const ok = confirm(`Este respaldo tiene ${parsed.data.length} títulos. Esto va a reemplazar lo que tenés guardado ahora acá. ¿Continuar?`);
      if (!ok) return;
      data = parsed.data;
      nextId = parsed.nextId || (Math.max(0, ...data.map(d => d.id || 0)) + 1);
      save();
      expandedId = null;
      render();
      alert('Respaldo importado correctamente ✨');
    } catch (err) {
      alert('No se pudo leer el archivo. Asegurate de que sea un respaldo exportado desde esta misma biblioteca.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

(async function init() {
  await load();
  render();
})();
</script>
</body>
</html>
